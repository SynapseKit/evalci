name: Bug Report
description: Something isn't working as expected
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug. Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: "When EvalCI runs, it raises ..."
    validations:
      required: true

  - type: textarea
    id: workflow
    attributes:
      label: Workflow YAML
      description: The relevant part of your GitHub Actions workflow.
      render: yaml
      placeholder: |
        - uses: SynapseKit/evalci@v1
          with:
            path: tests/evals
            threshold: "0.80"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened? Include the full Action log output if applicable.
      render: shell
    validations:
      required: true

  - type: input
    id: evalci_version
    attributes:
      label: EvalCI version
      placeholder: "v1"
    validations:
      required: true

  - type: input
    id: synapsekit_version
    attributes:
      label: synapsekit version
      placeholder: "1.5.1"
    validations:
      required: false

  - type: input
    id: runner
    attributes:
      label: Runner OS
      placeholder: "ubuntu-latest / macos-latest / windows-latest"
    validations:
      required: false

  - type: input
    id: extras
    attributes:
      label: Extras installed
      description: Which synapsekit extras are you using?
      placeholder: "openai,anthropic"
    validations:
      required: false
